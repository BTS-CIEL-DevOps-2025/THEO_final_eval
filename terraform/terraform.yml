name: 'Terraform'
run-name: 'Deployed by toto'

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
  pull_request:

permissions:
  contents: read

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Azure CLI script
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          az account show
          
    - name: Terraform Init
      run: terraform init
    # Generates an execution plan for Terraform
    - name: Terraform Plan
      run: terraform plan -input=false
